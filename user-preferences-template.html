<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>User Preferences Template · Sauravi Rai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .prose h1 { font-size: 1.875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; color: #1c2530; }
    .prose h2 { font-size: 1.5rem; font-weight: 700; margin-top: 1.75rem; margin-bottom: 0.5rem; color: #1c2530; border-bottom: 1px solid #e5e9f0; padding-bottom: 0.3rem; }
    .prose h3 { font-size: 1.125rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.4rem; color: #1c2530; }
    .prose p { margin: 0.75rem 0; line-height: 1.7; color: #374151; }
    .prose ul, .prose ol { margin: 0.5rem 0 0.5rem 1.5rem; color: #374151; }
    .prose li { margin: 0.25rem 0; line-height: 1.6; }
    .prose code { background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 0.25rem; font-size: 0.875rem; }
    .prose pre { background: #1c2530; color: #e5e9f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
    .prose pre code { background: none; padding: 0; color: inherit; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.875rem; }
    .prose th { background: #f9fafb; font-weight: 600; text-align: left; padding: 0.5rem 0.75rem; border: 1px solid #e5e9f0; }
    .prose td { padding: 0.5rem 0.75rem; border: 1px solid #e5e9f0; }
    .prose strong { color: #1c2530; }
    .prose a { color: #0053e2; text-decoration: underline; text-underline-offset: 2px; }
    .prose blockquote { border-left: 3px solid #0053e2; padding-left: 1rem; color: #6b7280; margin: 1rem 0; }
    .prose hr { border: none; border-top: 1px solid #e5e9f0; margin: 1.5rem 0; }
    .prose em { color: #6b7280; }
  </style>
</head>
<body class="bg-white">
  <nav class="sticky top-0 z-30 bg-white/95 backdrop-blur-sm border-b border-gray-100">
    <div class="max-w-3xl mx-auto px-6 flex items-center justify-between h-14">
      <a href="/" class="text-sm font-semibold text-gray-900">Sauravi Rai</a>
      <a href="/" class="text-sm text-gray-500 hover:text-gray-900 transition">← Back to portfolio</a>
    </div>
  </nav>
  <main class="max-w-3xl mx-auto px-6 py-10">
    <div id="content" class="prose"></div>
  </main>
  <footer class="border-t border-gray-100 text-gray-400 text-xs">
    <div class="max-w-3xl mx-auto px-6 py-5">© <script>document.write(new Date().getFullYear())</script> Sauravi Rai</div>
  </footer>
  <script>
    fetch('./user-preferences-template.md')
      .then(r => r.text())
      .then(md => { document.getElementById('content').innerHTML = marked.parse(md); })
      .catch(() => { document.getElementById('content').innerHTML = '<p>Failed to load content.</p>'; });
  </script>
</body>
</html>
